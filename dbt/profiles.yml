# Conexao do dbt com o BigQuery.
# method: oauth -> usa o ADC (gcloud auth application-default login), sem chave.
pipeline_cripto:
  target: dev
  outputs:
    dev:
      type: bigquery
      method: oauth
      project: project-7a99ed4c-9c50-46b3-abd
      dataset: cripto_analytics
      location: southamerica-east1
      threads: 4
      timeout_seconds: 300
      priority: interactive
