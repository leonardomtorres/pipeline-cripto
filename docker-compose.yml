# Airflow (orquestrador):
#   docker compose up airflow --build     -> sobe em http://localhost:8080
#
# Rodar etapas isoladas (sem Airflow):
#   docker compose run --rm ingestion     -> so a ingestao
#   docker compose run --rm dbt run        -> so os modelos dbt

services:
  ingestion:
    build: ./ingestion
    env_file: .env
    volumes:
      - ./credentials:/app/credentials:ro
    environment:
      GOOGLE_APPLICATION_CREDENTIALS: /app/credentials/adc.json

  dbt:
    build: ./dbt
    env_file: .env
    working_dir: /dbt
    volumes:
      - ./dbt:/dbt
      - ./credentials:/dbt/credentials:ro
    environment:
      GOOGLE_APPLICATION_CREDENTIALS: /dbt/credentials/adc.json
      DBT_PROFILES_DIR: /dbt
    entrypoint: ["dbt"]
    command: ["--version"]

  airflow:
    build:
      context: .
      dockerfile: orchestration/Dockerfile
    env_file: .env
    environment:
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      GOOGLE_APPLICATION_CREDENTIALS: /opt/airflow/gcp/adc.json
    volumes:
      - ./orchestration/dags:/opt/airflow/dags
      - ./ingestion:/opt/airflow/ingestion
      - ./dbt:/opt/airflow/dbt
      - ./credentials/adc.json:/opt/airflow/gcp/adc.json:ro
    ports:
      - "8080:8080"
    command: standalone
