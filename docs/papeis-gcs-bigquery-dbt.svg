<svg viewBox="0 0 780 470" xmlns="http://www.w3.org/2000/svg" font-family="sans-serif">
  <title>Papel de GCS, BigQuery e dbt</title>
  <desc>Comparativo: GCS guarda arquivos crus, BigQuery guarda e consulta tabelas com SQL, dbt transforma tabelas sem armazenar nada.</desc>

  <text x="390" y="32" text-anchor="middle" font-size="13" fill="#888780">O dado viaja por aqui:</text>
  <g font-size="13" fill="#5F5E5A" text-anchor="middle">
    <text x="120" y="56">Python</text>
    <text x="225" y="56">→</text>
    <text x="330" y="56" font-weight="700" fill="#2C2C2A">GCS</text>
    <text x="435" y="56">→</text>
    <text x="545" y="56" font-weight="700" fill="#2C2C2A">BigQuery</text>
    <text x="650" y="56">→</text>
    <text x="725" y="56">Looker</text>
  </g>
  <text x="545" y="74" text-anchor="middle" font-size="11" fill="#7F77DD">↑ dbt transforma aqui dentro</text>

  <rect x="30" y="92" width="230" height="330" rx="10" fill="none" stroke="#D3D1C7"/>
  <text x="50" y="124" font-size="18" font-weight="700" fill="#2C2C2A">GCS</text>
  <text x="50" y="146" font-size="12" fill="#888780">o estoque / freezer</text>
  <line x1="50" y1="160" x2="240" y2="160" stroke="#D3D1C7"/>
  <text x="50" y="190" font-size="13" fill="#5F5E5A">Guarda</text>
  <text x="50" y="210" font-size="14" font-weight="600" fill="#2C2C2A">arquivos crus (.parquet)</text>
  <text x="50" y="252" font-size="13" fill="#5F5E5A">Consulta com SQL?</text>
  <text x="50" y="274" font-size="14" font-weight="700" fill="#D85A30">✗ não</text>
  <text x="50" y="316" font-size="13" fill="#5F5E5A">Armazena dado?</text>
  <text x="50" y="338" font-size="14" font-weight="700" fill="#1D9E75">✓ sim</text>
  <text x="50" y="392" font-size="12" fill="#888780">Backup do dado</text>
  <text x="50" y="408" font-size="12" fill="#888780">bruto, baratinho.</text>

  <rect x="275" y="92" width="230" height="330" rx="10" fill="none" stroke="#D3D1C7"/>
  <text x="295" y="124" font-size="18" font-weight="700" fill="#2C2C2A">BigQuery</text>
  <text x="295" y="146" font-size="12" fill="#888780">a cozinha (fogão + bancada)</text>
  <line x1="295" y1="160" x2="485" y2="160" stroke="#D3D1C7"/>
  <text x="295" y="190" font-size="13" fill="#5F5E5A">Guarda</text>
  <text x="295" y="210" font-size="14" font-weight="600" fill="#2C2C2A">tabelas (linhas/colunas)</text>
  <text x="295" y="252" font-size="13" fill="#5F5E5A">Consulta com SQL?</text>
  <text x="295" y="274" font-size="14" font-weight="700" fill="#1D9E75">✓ sim</text>
  <text x="295" y="316" font-size="13" fill="#5F5E5A">Armazena dado?</text>
  <text x="295" y="338" font-size="14" font-weight="700" fill="#1D9E75">✓ sim</text>
  <text x="295" y="392" font-size="12" fill="#888780">Onde os dados moram</text>
  <text x="295" y="408" font-size="12" fill="#888780">e são analisados.</text>

  <rect x="520" y="92" width="230" height="330" rx="10" fill="none" stroke="#7F77DD"/>
  <text x="540" y="124" font-size="18" font-weight="700" fill="#7F77DD">dbt</text>
  <text x="540" y="146" font-size="12" fill="#888780">a receita + o cozinheiro</text>
  <line x1="540" y1="160" x2="730" y2="160" stroke="#D3D1C7"/>
  <text x="540" y="190" font-size="13" fill="#5F5E5A">Guarda</text>
  <text x="540" y="210" font-size="14" font-weight="600" fill="#2C2C2A">nada (só instruções SQL)</text>
  <text x="540" y="252" font-size="13" fill="#5F5E5A">Consulta com SQL?</text>
  <text x="540" y="274" font-size="14" font-weight="700" fill="#7F77DD">manda o BigQuery rodar</text>
  <text x="540" y="316" font-size="13" fill="#5F5E5A">Armazena dado?</text>
  <text x="540" y="338" font-size="14" font-weight="700" fill="#D85A30">✗ não</text>
  <text x="540" y="392" font-size="12" fill="#888780">Transforma tabela</text>
  <text x="540" y="408" font-size="12" fill="#888780">em tabela, com testes.</text>

  <text x="30" y="452" font-size="11" fill="#888780">
    <tspan fill="#1D9E75" font-weight="700">✓</tspan> faz   ·   <tspan fill="#D85A30" font-weight="700">✗</tspan> não faz   ·   <tspan fill="#7F77DD" font-weight="700">dbt</tspan> não tem dado nem motor próprio: usa o BigQuery
  </text>
</svg>
